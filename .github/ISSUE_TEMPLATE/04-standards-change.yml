name: Standards change
description: Propose a change to Docker Atlas standards, templates, or validation rules
title: "Standards change: "
labels: ["standards", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compose style guide
        - Security checklist
        - Metadata schema
        - README template
        - Validation workflow
        - Folder structure
        - Issue or PR templates
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behaviour or standard
      placeholder: What does Docker Atlas currently say or do?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      placeholder: What should change?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why this matters
      placeholder: Explain the benefit, risk reduction, or consistency improvement.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact on existing entries
      placeholder: Will existing apps/stacks need updates? Is this breaking or additive?

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I have checked for an existing standards proposal.
          required: true
